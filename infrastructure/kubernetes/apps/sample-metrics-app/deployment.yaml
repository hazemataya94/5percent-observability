apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-metrics-app
  namespace: fivepercent-observability
  labels:
    app.kubernetes.io/name: sample-metrics-app
    app.kubernetes.io/part-of: fivepercent-observability-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-metrics-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-metrics-app
        app.kubernetes.io/part-of: fivepercent-observability-lab
    spec:
      containers:
        - name: sample-metrics-app
          image: fivepercent-observability-sample-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_PORT
              value: "8080"
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
